name: build-and-push-ollama

# Build the air-gapped Ollama sidecar image (base models baked in) and push to GHCR.
# Separate from the app image because it changes rarely. amd64 (EKS arch).

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile.ollama"
      - ".github/workflows/docker-publish-ollama.yml"
  workflow_dispatch: {}

concurrency:
  group: ollama-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/finetune-ollama

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
      - uses: docker/setup-buildx-action@v3
      - name: Build and push (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.ollama
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
