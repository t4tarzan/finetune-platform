name: build-and-push

# Build the platform image and publish it to GHCR under THIS repo's owner
# (ghcr.io/t4tarzan/finetune-platform). Pushing to the same owner works with the
# automatic GITHUB_TOKEN — no PAT needed (unlike pushing to a different org).
# EKS nodes are amd64, so we build linux/amd64 (the Dockerfile installs CPU torch).

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths-ignore:
      - "**/*.md"
      - "demo*"
      - "docs-site/**"
  workflow_dispatch: {}

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/${{ github.repository }}   # ghcr.io/t4tarzan/finetune-platform

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write     # push to GHCR with the built-in GITHUB_TOKEN
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=semver,pattern={{version}}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "### Pushed" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.meta.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
