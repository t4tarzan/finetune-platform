name: build-image
# Build the finetune-platform image on GitHub runners (native amd64) and push to
# ghcr.io/dclawstack/finetune-platform. amd64-only (the EKS node is amd64; a
# multi-arch PyTorch image would be huge/slow). Needs a GHCR_PAT secret with
# write:packages on dclawstack (t4tarzan repos can't write dclawstack via GITHUB_TOKEN).
on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'requirements.txt'
      - 'scripts/**'
      - '**/*.py'
      - 'templates/**'
      - 'static/**'
      - '.github/workflows/build-image.yml'
env:
  IMAGE: ghcr.io/dclawstack/finetune-platform
jobs:
  build:
    runs-on: ubuntu-latest
    permissions: { contents: read, packages: write }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to ghcr
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT || secrets.GITHUB_TOKEN }}
      - name: Build + push (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
