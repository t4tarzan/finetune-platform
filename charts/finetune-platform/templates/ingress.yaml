{{- if .Values.ingress.enabled -}}
{{- $full := include "finetune-platform.fullname" . -}}
{{- /* When basePath is set, serve under that sub-path on nginx: a regex path that
       captures the remainder + a rewrite-target that strips the prefix so requests
       reach the app's "/" routes. Otherwise use the plain ingress.path. */ -}}
{{- $path := .Values.ingress.path -}}
{{- $pathType := .Values.ingress.pathType -}}
{{- if .Values.basePath -}}
{{- $path = printf "%s(/|$)(.*)" .Values.basePath -}}
{{- $pathType = "ImplementationSpecific" -}}
{{- end -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $full }}
  labels:
    {{- include "finetune-platform.labels" . | nindent 4 }}
  annotations:
    {{- if .Values.basePath }}
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    {{- end }}
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- with .Values.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    - {{- if .Values.ingress.host }}
      host: {{ .Values.ingress.host | quote }}
      {{- end }}
      http:
        paths:
          - path: {{ $path | quote }}
            pathType: {{ $pathType }}
            backend:
              service:
                name: {{ $full }}
                port:
                  number: {{ .Values.ports.ui }}
{{- end }}
