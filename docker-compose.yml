# Self-contained deployment of the Fine-Tuning Platform.
#
# The same image runs on macOS (Docker Desktop, arm64) and Linux (amd64): inside the
# container the platform always uses the HuggingFace/CPU backend (containers are
# Linux, so MLX/Metal is unavailable). There is no `platform:` pin, so Docker builds
# for the host architecture. For MLX/Metal acceleration on Apple Silicon, run
# bare-metal with `make run` instead.
#
# Ollama (base-model chat) — two choices:
#   A) Host Ollama (default): platform talks to an Ollama running on your machine.
#        docker compose up -d --build                       # or: make docker-up
#   B) Bundled Ollama container (self-contained): enable the `ollama` profile and
#      point the platform at it. A base model (qwen2.5:0.5b by default) is pulled
#      automatically at deploy time; override with OLLAMA_PULL_MODELS.
#        OLLAMA_HOST=http://ollama:11434 \
#          docker compose --profile ollama up -d --build    # or: make docker-up-ollama
#        OLLAMA_PULL_MODELS="qwen2.5:0.5b qwen2.5:7b" make docker-up-ollama   # custom set
#
#   docker compose logs -f           # follow logs
#   docker compose down              # stop (both modes; or: make docker-down)

services:
  platform:
    # Default: pull the self-contained public appliance image (models + data + the
    # pre-trained sre-assistant adapter all baked in). `docker compose up` just works.
    # To build your own instead, uncomment `build: .` and run `docker compose build`.
    image: ghcr.io/t4tarzan/finetune-platform:latest
    # build: .
    container_name: finetune-platform
    init: true                      # tini as PID 1 — clean signal handling / reaping
    ports:
      - "7100:7100"                 # web UI (chat + train)
      - "7200:7200"                 # OpenAI-compatible inference server
    environment:
      - PORT=7100
      - INFERENCE_PORT=7200
      - HF_HOME=/root/.cache/huggingface
      # Where to reach Ollama for base-model chat. Default = an Ollama on the host
      # (works on macOS Docker Desktop and, via the host-gateway alias below, on
      # Linux). Override to http://ollama:11434 to use the bundled `ollama` service.
      # If no Ollama is reachable, base models just don't appear — fine-tuned models
      # still do.
      - OLLAMA_HOST=${OLLAMA_HOST:-http://host.docker.internal:11434}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # Named volumes so the bundled data/models seed (and any rows a user appends)
      # persist across restarts. serve.sh seeds these from /app/_bundled on first boot.
      # No HF-cache mount on purpose — the base models are baked into the image layer.
      - ftp-data:/app/data           # datasets + DuckDB + training history
      - ftp-models:/app/models       # adapters + merged/served models
      - ftp-logs:/app/logs           # training / export / server logs
    restart: unless-stopped
    healthcheck:
      # Probe both services — a dead inference server (:7200) must mark the container
      # unhealthy, not just a dead UI (:7100). serve.sh backgrounds the inference
      # server, so its failure wouldn't otherwise surface.
      test: ["CMD", "python", "-c", "import urllib.request as u; u.urlopen('http://localhost:7100/'); u.urlopen('http://localhost:7200/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  # Optional bundled Ollama — only starts with `--profile ollama` (make docker-up-ollama).
  # Use this for a fully self-contained deployment instead of a host Ollama.
  ollama:
    image: ollama/ollama:latest
    container_name: finetune-ollama
    profiles: ["ollama"]
    # Not published to the host on purpose: the platform reaches it in-network as
    # `ollama:11434`, and publishing 11434 would clash with a host Ollama. To access
    # it from the host, add `ports: ["11434:11434"]` (only if no host Ollama runs).
    expose:
      - "11434"
    volumes:
      - ollama-data:/root/.ollama   # pulled models persist across runs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  # One-shot: pull base model(s) into the bundled Ollama at deploy time so it isn't
  # empty. Override the list with OLLAMA_PULL_MODELS (space-separated), e.g.
  #   OLLAMA_PULL_MODELS="qwen2.5:0.5b qwen2.5:7b" make docker-up-ollama
  # Pulled models persist in the ollama-data volume, so this is a no-op on later runs.
  ollama-pull:
    image: ollama/ollama:latest
    container_name: finetune-ollama-pull
    profiles: ["ollama"]
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_PULL_MODELS=${OLLAMA_PULL_MODELS:-qwen2.5:0.5b}
    entrypoint: ["/bin/sh", "-c", "for m in $$OLLAMA_PULL_MODELS; do echo \"==> pulling $$m\"; ollama pull \"$$m\"; done"]
    restart: "no"

volumes:
  ftp-data:
  ftp-models:
  ftp-logs:
  ollama-data:
